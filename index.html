<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Acadêmico</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🎓 Dashboard Acadêmico</h1>
        <p>Calculadora de Média do Semestre</p>

        <div class="card">
            <div class="input-group">
                <label for="notaProva">Nota da Prova Presencial (Peso 7):</label>
                <input type="number" id="notaProva" placeholder="Ex: 8.5" step="0.1" min="0" max="10">
            </div>

            <div class="input-group">
                <label for="notaAva">Nota do AVA / Trabalhos (Peso 3):</label>
                <input type="number" id="notaAva" placeholder="Ex: 10.0" step="0.1" min="0" max="10">
            </div>

            <button onclick="calcularMedia()">Calcular Média Final</button>
        </div>

       <div class="resultado-card" id="resultadoCard" style="display: none;">
            <h2>Média Final: <span id="valorMedia">0.0</span></h2>
            <div id="statusAluno" class="status"></div>
        </div>

        <div class="assinatura">
            <p>Desenvolvido por <a href="https://github.com/Vlad-III" target="_blank">Guilherme Overson</a></p>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
